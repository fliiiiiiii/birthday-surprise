<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff5f8f,#ff8fab,#ffd6e0);
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    transition:1s;
}

/* floating hearts */
.heart{
    position:absolute;
    width:16px;
    height:16px;
    background:rgba(255,255,255,0.35);
    transform:rotate(45deg);
    animation:float 10s linear infinite;
}

.heart:before,.heart:after{
    content:'';
    width:16px;
    height:16px;
    background:rgba(255,255,255,0.35);
    border-radius:50%;
    position:absolute;
}

.heart:before{top:-8px;}
.heart:after{left:-8px;}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(45deg);
        opacity:0;
    }
    20%{opacity:1;}
    100%{
        transform:translateY(-10vh) rotate(45deg);
        opacity:0;
    }
}

.card{
    z-index:10;
    width:100%;
    max-width:500px;
    max-height:88vh;
    overflow-y:auto;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(20px);
    border-radius:28px;
    padding:28px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    color:white;
    transition:1s;
}

h1{
    font-size:28px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:50px;
    font-size:15px;
    cursor:pointer;
    background:white;
    color:#ff4d6d;
    font-weight:bold;
    margin-top:25px;
}

#message{
    margin-top:25px;
    font-size:18px;
    line-height:1.8;
}

#typingText{
    margin-top:25px;
    font-size:15px;
    line-height:1.9;
    text-align:left;
    white-space:pre-line;
}

.confetti{
    position:absolute;
    font-size:22px;
    animation:drop 4s linear forwards;
}

@keyframes drop{
    0%{transform:translateY(-10vh);}
    100%{transform:translateY(100vh);}
}

@keyframes explodeHeart{
    0%{
        transform:scale(0);
        opacity:0;
    }
    30%{
        transform:scale(1.5);
        opacity:1;
    }
    70%{
        transform:scale(2.5);
        opacity:1;
    }
    100%{
        transform:scale(4);
        opacity:0;
    }
}

#loveText{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:34px;
    text-align:center;
    color:white;
    font-weight:bold;
    z-index:999;
    opacity:0;
    animation:fadeLove 3s forwards;
}

@keyframes fadeLove{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
    50%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<div class="card" id="mainCard">
    <h1>🎂 Happy Birthday ❤️</h1>
    <p>Untuk orang paling spesial ✨</p>

    <button onclick="startSurprise()">Mulai Kejutan 🎁</button>

    <div id="message"></div>
</div>

<div id="specialPage" class="card" style="display:none;">
    <h1>💌 Pesan Khusus Untukmu</h1>
    <p id="typingText"></p>
</div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady(){
    player = new YT.Player('player',{
        height:'0',
        width:'0',
        videoId:'jKVH5XE1518',
        playerVars:{
            autoplay:0,
            controls:0,
            start:13,
            loop:1,
            playlist:'jKVH5XE1518'
        }
    });
}

function startSurprise(){
    player.playVideo();

    const msg=document.getElementById("message");

    msg.innerHTML="💌 Tunggu sebentar...";

    setTimeout(()=>{msg.innerHTML="🎉 Selamat ulang tahun ❤️";},2000);
    setTimeout(()=>{msg.innerHTML+="<br>Asik udah kepala 2 aja ✨";},4000);
    setTimeout(()=>{msg.innerHTML+="<br>Udah tambah tua nih 💖";},6000);
    setTimeout(()=>{msg.innerHTML+="<br>Sekarang aku manggilnya tante kali yaa, hehe 🌷";},8000);

    setTimeout(()=>{launchConfetti();},9000);

    setTimeout(()=>{
        msg.innerHTML+=`<br><br><button onclick="openMessage()">Buka Pesan Khusus 💌</button>`;
    },11000);
}

function launchConfetti(){
    for(let i=0;i<120;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.innerHTML=["🎉","✨","❤️","🎊"][Math.floor(Math.random()*4)];
        c.style.left=Math.random()*100+"vw";
        c.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
    }
}

function openMessage(){
    document.getElementById("mainCard").style.display="none";
    document.getElementById("specialPage").style.display="block";

    let text=`Selamat ulang tahun yaa sayangku, cintakuu, cantikku...

Sehat sehat yaa panjang umurnyaa, lancar rezekinya, makin cantik, makin sayang sama aku, makin cinta juga sama aku ❤️

Semoga di umur yang sekarang kamu bisa pelan-pelan mencapai satu per satu apa yang kamu inginkan, dilancarkan rezekinya, semua usaha kamu dimudahkan, langkah kamu selalu diberi jalan terbaik, dan semua hal baik datang ke hidupmu.

Semoga kamu bisa membanggakan mamah sama bapa, jadi anak yang sholehah, tetap kuat menjalani semuanya, dan selalu diberi kebahagiaan dalam setiap harimu.

Terimakasih yaa karena sudah lahir dan sudah bertahan sejauh ini di dunia yang kadang tidak selalu menyenangkan.

Aku harap dengan hadirnya aku, bisa jadi salah satu alasan yang bikin kamu tetap tersenyum dan merasa bahagia.

Kalau capek, istirahat yaa. Kalau sedih, cerita. Jangan dipendam sendiri.

Terus juga... kurang-kurangin ya egonya 😆  
Kontrol juga emosinya, okeyy.

Pokoknya di mata aku, kamu tetap jadi yang terbaik.

Maaf ya kalau aku cuma bisa kasih ini, tapi aku akan mengusahakan yang terbaik buat kamu.

Sekali lagi selamat ulang tahun yang ke-20 ❤️

Semoga semua hal baik selalu datang ke hidupmu dan semoga aku tetap jadi bagian dari senyummu... selalu ❤️`;

    let i=0;

    function typeWriter(){
        if(i<text.length){
            document.getElementById("typingText").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter,45);
        }else{
            document.getElementById("typingText").innerHTML += `<br><br><button onclick="virtualHug()">Pencet aku dong 🤍</button>`;
        }
    }

    typeWriter();
}

function virtualHug(){

    document.body.style.background="linear-gradient(135deg,#ff4d9d,#ff80bf,#ffd6ec)";

    for(let i=0;i<120;i++){
        let heart=document.createElement("div");
        heart.style.position="absolute";
        heart.style.left=Math.random()*100+"vw";
        heart.style.top=Math.random()*100+"vh";
        heart.style.fontSize=(Math.random()*70+50)+"px";
        heart.style.animation=`explodeHeart ${Math.random()*2+3}s ease forwards`;
        heart.innerHTML="💗";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    }

    let love=document.createElement("div");
    love.id="loveText";
    love.innerHTML="Aku Sayang Kamu ❤️";
    document.body.appendChild(love);

    setTimeout(()=>love.remove(),3000);

    setTimeout(()=>{showCountdown();},2500);
}

function showCountdown(){
    let today=new Date();
    let nextBirthday=new Date(today.getFullYear(),3,4);

    if(today>nextBirthday){
        nextBirthday.setFullYear(today.getFullYear()+1);
    }

    let diff=nextBirthday-today;
    let days=Math.floor(diff/(1000*60*60*24));

    document.getElementById("typingText").innerHTML +=
    `<br><br>⏳ ${days} hari lagi menuju ulang tahun berikutnya...`;
}

for(let i=0;i<60;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*6+5)+"s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
